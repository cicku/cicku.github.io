<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnstile?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            background: #0a0a0a;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .title {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(
                270deg,
                #f97316, #ef4444, #ec4899, #a855f7,
                #6366f1, #3b82f6, #06b6d4, #10b981,
                #f97316, #ef4444
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite, float 3s ease-in-out infinite;
            text-align: center;
            position: relative;
        }

        .title::after {
            content: "Turnstile?";
            position: absolute;
            inset: 0;
            background: inherit;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(30px);
            opacity: 0.5;
            animation: gradient-shift 4s ease infinite, pulse-glow 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes gradient-shift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; filter: blur(30px); }
            50%      { opacity: 0.6; filter: blur(40px); }
        }

        .widget-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: fade-in 1s ease 0.5s both;
        }

        .widget-label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            opacity: 0;
            animation: drift 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new window.VConsole();
    </script>
    <div class="particles" id="particles"></div>

    <h1 class="title">Turnstile?</h1>

    <div class="widget-container">
        <span class="widget-label">Prove you're human</span>
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAAAEVrbVlskbcP0b4"
             data-theme="dark"
             data-size="flexible"
             data-callback="onSuccess">
        </div>
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <script>
        function onSuccess(token) {
            console.log("Turnstile passed!", token);
        }

        // Floating background particles
        const colors = ["#f97316","#ef4444","#ec4899","#a855f7","#6366f1","#3b82f6","#06b6d4","#10b981"];
        const container = document.getElementById("particles");
        for (let i = 0; i < 30; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "%";
            p.style.top = Math.random() * 100 + "%";
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDelay = Math.random() * 6 + "s";
            p.style.animationDuration = 4 + Math.random() * 4 + "s";
            container.appendChild(p);
        }

        // Particle drift animation (injected via JS for randomness)
        const style = document.createElement("style");
        style.textContent = `
            @keyframes drift {
                0%   { opacity: 0; transform: translateY(0) scale(1); }
                25%  { opacity: 0.6; }
                50%  { opacity: 0.3; transform: translateY(-80px) scale(1.5); }
                75%  { opacity: 0.5; }
                100% { opacity: 0; transform: translateY(-160px) scale(0.5); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
